<title>Shadow Net Launcher</title>

<style>
:root {
  --bg1:#05070d;
  --bg2:#0b1020;
  --glass: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.12);
  --purple:#7c3aed;
  --cyan:#22d3ee;
  --text:#ffffff;
  --muted:#b6c2d6;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Montserrat,sans-serif;
  color:var(--text);
  background: radial-gradient(circle at top, var(--bg2), var(--bg1));
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}


body::before{
  content:"";
  position:absolute;
  width:600px;
  height:600px;
  background: radial-gradient(circle, rgba(124,58,237,0.25), transparent 70%);
  top:-200px;
  left:-200px;
  filter: blur(60px);
}

.container{
  width:100%;
  max-width:720px;
  padding:30px;
}

.header{
  text-align:center;
  margin-bottom:25px;
}

.title{
  font-family:Orbitron;
  font-size:42px;
  letter-spacing:6px;
}

.title span{
  color:var(--purple);
}

.subtitle{
  color:var(--white);
  margin-top:6px;
  font-size:20px;
}

.panel{
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:20px;
  padding:22px;
  backdrop-filter: blur(14px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

.section-title{
  font-size:12px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:12px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

button, a.btn{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid var(--border);
  background: rgba(15,23,42,0.6);
  color:var(--text);
  font-weight:600;
  cursor:pointer;
  text-decoration:none;
  text-align:center;
  transition:0.2s ease;
  display:block;
}

button:hover, a.btn:hover{
  transform:translateY(-2px);
  border-color:var(--purple);
  box-shadow:0 0 18px rgba(124,58,237,0.35);
}

.primary{
  background: linear-gradient(135deg, var(--purple), var(--cyan));
  border:none;
  color:black;
  font-weight:800;
}

.full{
  grid-column: span 2;
}

.footer{
  text-align:center;
  margin-top:18px;
  font-size:12px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="title"><span>SHADOW</span> NET <span> CLIENT</span></div>
    <div class="subtitle">Launcher</div>
  </div>

  <div class="panel">

    <div class="section-title">Shadow Net Client</div>

    <div class="grid">
      <a class="btn primary" href="/shadownetclient/js">
        JavaScript Client
      </a>

      <a class="btn primary" href="/shadownetclient/wasm">
        WASM Client
      </a>
    </div>

    <div style="height:14px"></div>

    <div class="section-title">Other Clients</div>

    <div class="grid">
      <a class="btn" href="https://shadownetwork.shop/eclipseclientlatest.html" target="_blank">
        Eclipse Client
      </a>

      <a class="btn" href="https://launcher.stevesmp.us/main.html" target="_blank">
        Apex Launcher
      </a>
    </div>

    <div style="height:14px"></div>

    <div class="section-title">Download ShadowNetClient</div>

    <a class="btn full" href="https://github.com/ShadowNetworkDevs/ShadowNetClientOfficial/releases/tag/v1.3" target="_blank">
      Download ShadowNetClient v1.3
    </a>

  </div>

  <div class="footer">
    Tip: Use ShadowNetClient if other clients are blocked on your network
  </div>

</div>

</body>
</html>
